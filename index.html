<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Oghenefejiro Stephanie Abere" />
    <meta name="description" content="A social media website" />
    <meta name="keywords" content="fakebook, social media, html, css, web, web development" />
    <link rel="icon" href="./assets/media/favicon.png?v=2" type="image/x-icon" />
    <title>Shape Factory</title>
    <link rel="stylesheet" href="./assets/styles/style.css" media="all" />
    <script src="./assets/script/app.js" defer type="module"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <div class="container header-container">
        <a href="index.html">
          <h1 class="app-name">Fakebook</h1>
        </a>
        <nav>
          <ul>
            <li><a href="#">Friends</a></li>
            <li><a href="#">Pages</a></li>
            <li><a href="#">Groups</a></li>
            <li><a href="#">My Ads</a></li>
            <li><a href="#">Settings</a></li>
          </ul>
        </nav>
        <div id="profile" class="profile-container" title="profile">
          <img src="./assets/media/profile.webp" alt="User profile image" />
        </div>
      </div>
    </header>
    <main>
      <div class="main-container">
        <section class="form-container">
          <form id="posts-form">
            <textarea name="post" id="post" placeholder="What's on your mind?" rows="8"></textarea>
            <div class="form-footer">
              <div class="file-input">
                <label for="file" title="Select an image">
                  <i class="fa-solid fa-image"></i>
                </label>
                <input type="file" name="file" id="file" accept="image/*" />
                <span class="file-name"></span>
              </div>
              <button id="post-button" type="submit">Post</button>
            </div>
          </form>
        </section>
        <section class="posts-container" id="posts-section"></section>
      </div>
    </main>
    <div id="modal-container" class="hidden dialog-container"></div>
  </body>
</html>
